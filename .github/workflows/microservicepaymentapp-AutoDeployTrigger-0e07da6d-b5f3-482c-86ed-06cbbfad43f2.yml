name: Trigger auto deployment for microservicepaymentapp

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/microservicepaymentapp-AutoDeployTrigger-0e07da6d-b5f3-482c-86ed-06cbbfad43f2.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.MICROSERVICEPAYMENTAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.MICROSERVICEPAYMENTAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.MICROSERVICEPAYMENTAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: microservicepayment111.azurecr.io
          registryUsername: ${{ secrets.MICROSERVICEPAYMENTAPP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.MICROSERVICEPAYMENTAPP_REGISTRY_PASSWORD }}
          containerAppName: microservicepaymentapp
          resourceGroup: microservice
          imageToBuild: microservicepayment111.azurecr.io/microservicepaymentapp:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


